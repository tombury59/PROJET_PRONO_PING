services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage/logs:/var/www/html/storage/logs

  db:
    image: postgres:16-alpine
    # Local stand-in for Supabase. Credentials here must match
    # DB_DATABASE / DB_USERNAME / DB_PASSWORD in .env.docker.
    environment:
      POSTGRES_DB: prono
      POSTGRES_USER: prono
      POSTGRES_PASSWORD: prono
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prono -d prono"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
